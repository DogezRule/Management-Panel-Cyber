---
- name: Reboot all managed hosts
  hosts: all
  become: true
  gather_facts: false  # Speeds up the process since we just want to reboot

  tasks:
    - name: Trigger a reboot and wait for the system to respond
      ansible.builtin.reboot:
        msg: "Reboot initiated by Ansible for system maintenance."
        connect_timeout: 5
        reboot_timeout: 600
        pre_reboot_delay: 0
        post_reboot_delay: 30
        test_command: whoami

    - name: Verify system uptime
      ansible.builtin.command: uptime
      register: uptime_result

    - name: Display uptime
      ansible.builtin.debug:
        var: uptime_result.stdout